name: SerDes Daily Digest

on:
  schedule:
    # Every day at 03:30 UTC = 09:00 IST
    - cron: '30 3 * * *'

  # Manual trigger — also lets you type a one-off custom query
  workflow_dispatch:
    inputs:
      query:
        description: 'Custom search query (leave blank to use default)'
        required: false
        default: ''

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run digest
        env:
          # ── Required ──────────────────────────────────────────────────────────
          DIGEST_EMAIL:   ${{ vars.DIGEST_EMAIL }}          # your email address
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}     # from resend.com

          # ── Optional ──────────────────────────────────────────────────────────
          IEEE_API_KEY:   ${{ secrets.IEEE_API_KEY }}       # from developer.ieee.org
          SEARCH_QUERY:   ${{ github.event.inputs.query || vars.SEARCH_QUERY || 'SerDes high speed transceiver PAM4' }}

          # ── Resend sender — change after verifying your own domain ─────────────
          # While using resend.dev sandbox, FROM_EMAIL must stay as-is.
          # After adding your domain in Resend dashboard, set this to digest@yourdomain.com
          FROM_EMAIL: 'SerDes Digest <digest@resend.dev>'
        run: python generate_report.py
