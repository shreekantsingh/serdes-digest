name: SerDes Daily Digest
on:
  schedule:
    # Every day at 03:30 UTC = 09:00 IST
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      query:
        description: 'Custom search query (leave blank to use default)'
        required: false
        default: ''
jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run digest
        env:
          # ── Required ────────────────────────────────────────────────────────
          DIGEST_EMAIL:    ${{ vars.DIGEST_EMAIL }}
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}

          # ── API Keys (add these as Secrets in repo settings) ────────────────
          IEEE_API_KEY:    ${{ secrets.IEEE_API_KEY }}
          SERPAPI_KEY:     ${{ secrets.SERPAPI_KEY }}        # ← THIS WAS MISSING

          # ── Optional query overrides (set as Variables to customize) ────────
          ARXIV_QUERY:     ${{ vars.ARXIV_QUERY }}
          IEEE_QUERY:      ${{ vars.IEEE_QUERY }}
          SCHOLAR_QUERY:   ${{ vars.SCHOLAR_QUERY }}

          # ── Sender address ───────────────────────────────────────────────────
          FROM_EMAIL:      'SerDes Digest <digest@resend.dev>'

        run: python generate_report.py
